steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'functions/podcast'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - podcast-trigger
      - --gen2
      - --region=europe-west3
      - --source=.
      - --entry-point=podcast_trigger
      - --trigger-http
      - --runtime=python311
      - --memory=4GiB
      - --timeout=600s
      - --set-secrets=GCS_BUCKET_NAME=gcs-bucket-name:latest,RSS_FIREBASE_KEY=rss-firebase-key:latest,GEMINI_API_KEY=gemini-api-key:latest,SENDER_EMAIL=sender-email:latest,RECIPIENT_EMAIL=recipient-email:latest,CREDENTIALS_TOKEN_JSON=gmail-token:latest

options:
  logging: CLOUD_LOGGING_ONLY
